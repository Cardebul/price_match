volumes:
  pgdata:
  redis_data:

services:
  pg:
    container_name: pg
    image: postgres:18.4-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql
    restart: on-failure

  redis:
    image: redis:8.6-alpine
    container_name: redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  app:
    container_name: app
    build: .
    env_file: .env
    working_dir: /app/service
    depends_on:
      - pg
      - redis
    command: ["bash", "ex.sh"]
    ports:
      - 8000:8000

  worker:
    container_name: worker
    build: .
    env_file: .env
    working_dir: /app/service
    depends_on:
      - pg
      - redis
    command: uv run celery -A service worker -l INFO